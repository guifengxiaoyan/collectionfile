{% extends "base.html" %}

{% block title %}重置密码 - 文件收集系统{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h2><i class="fas fa-key"></i> 重置收集者密码</h2>
        <a href="{{ url_for('admin_objects') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> 返回列表
        </a>
    </div>
    
    <div class="form-card">
        <div class="collector-info">
            <p><strong>收集对象:</strong> {{ obj.name }}</p>
            <p><strong>当前用户名:</strong> {{ collector.username }}</p>
        </div>
        
        <form method="POST" class="reset-form">
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password" required placeholder="请输入新密码">
                <small>密码长度至少6位</small>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-key"></i> 重置密码
                </button>
                <a href="{{ url_for('admin_objects') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
