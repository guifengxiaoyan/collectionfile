<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 文件收集系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="login-container">
        <h1><i class="fas fa-user"></i> 用户登录</h1>
        <p style="color: var(--text-secondary); text-align: center; margin-bottom: 24px;">请输入您的账号和密码以继续</p>
        <form method="POST" action="{{ url_for('user_login') }}">
            <div class="form-group">
                <label><i class="fas fa-user"></i> 用户名</label>
                <input type="text" name="username" required placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> 密码</label>
                <input type="password" name="password" required placeholder="输入密码">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>
        <p class="back-home">
            <a href="{{ url_for('index') }}"><i class="fas fa-home"></i> 返回首页</a>
        </p>
    </div>
</body>
</html>
